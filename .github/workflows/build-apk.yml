name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      # Secrets에 서명 키가 등록돼 있으면 서명된 release APK,
      # 없으면 debug APK로 폴백 (매 빌드 서명이 달라져 덮어 설치 불가)
      - name: Build APK
        run: |
          chmod +x android/gradlew
          if [ -n "$KEYSTORE_B64" ] && [ -n "$KEYSTORE_PASSWORD" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/travelfx.keystore
            cd android && ./gradlew assembleRelease --no-daemon
            mv app/build/outputs/apk/release/app-release.apk ../travel-fx.apk
          else
            echo "서명 키 미등록 — debug 빌드로 폴백"
            cd android && ./gradlew assembleDebug --no-daemon
            mv app/build/outputs/apk/debug/app-debug.apk ../travel-fx.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: travel-fx-apk
          path: travel-fx.apk
          retention-days: 60

      # v* 태그를 push하면 APK를 붙인 GitHub Release가 자동 생성된다
      # (예: git tag v2.1.0 && git push origin v2.1.0)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" travel-fx.apk \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
